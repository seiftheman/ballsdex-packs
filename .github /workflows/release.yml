name: Release

on:
  push:
    branches:
      - master
    paths:
      - pyproject.toml

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep -m1 '^version' pyproject.toml | sed -E 's/version = "(.*)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if version increased
        id: check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v$VERSION"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — nothing to do."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST=$(git tag --list 'v*' | sed 's/^v//' | sort -V | tail -n1)

          if [ -z "$LATEST" ]; then
            echo "No previous release tags found — releasing $VERSION."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          HIGHEST=$(printf '%s\n%s\n' "$LATEST" "$VERSION" | sort -V | tail -n1)
          if [ "$HIGHEST" = "$VERSION" ] && [ "$VERSION" != "$LATEST" ]; then
            echo "Version increased: $LATEST -> $VERSION."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version did not increase ($LATEST -> $VERSION) — skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.check.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "v$VERSION" \
            --target "${{ github.sha }}" \
            --title "v$VERSION" \
            --generate-notes
