name: Release

on:
  push:
    branches:
      - main
    paths:
      - pyproject.toml

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep -m1 '^version' pyproject.toml | sed -E 's/version = "(.*)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if version increased
        id: check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v$VERSION"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — nothing to do."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST=$(git tag --list 'v*' | sed 's/^v//' | sort -V | tail -n1)

          if [ -z "$LATEST" ]; then
            echo "No previous release tags found — releasing $VERSION."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "previous_tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          HIGHEST=$(printf '%s\n%s\n' "$LATEST" "$VERSION" | sort -V | tail -n1)
          if [ "$HIGHEST" = "$VERSION" ] && [ "$VERSION" != "$LATEST" ]; then
            echo "Version increased: $LATEST -> $VERSION."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "previous_tag=v$LATEST" >> "$GITHUB_OUTPUT"
          else
            echo "Version did not increase ($LATEST -> $VERSION) — skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog
        if: steps.check.outputs.should_release == 'true'
        id: changelog
        run: |
          PREVIOUS_TAG="${{ steps.check.outputs.previous_tag }}"
          
          if [ -z "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s" --reverse)
          else
            COMMITS=$(git log "$PREVIOUS_TAG..HEAD" --pretty=format:"%s" --reverse)
          fi
          
          {
            echo "FEATURES<<EOF"
            echo "$COMMITS" | grep -i "^add" || true
            echo "EOF"
            echo "FIXES<<EOF"
            echo "$COMMITS" | grep -i "^fix\|^bug" || true
            echo "EOF"
            echo "IMPROVEMENTS<<EOF"
            echo "$COMMITS" | grep -i "^improve\|^refactor\|^update" || true
            echo "EOF"
            echo "OTHER<<EOF"
            echo "$COMMITS" | grep -v "^Merge\|^add\|^fix\|^bug\|^improve\|^refactor\|^update" || true
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Create GitHub release
        if: steps.check.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          NOTES="## Release v$VERSION"$'\n\n'
          
          if [ -n "${{ env.FEATURES }}" ]; then
            NOTES+="### Features"$'\n'"${{ env.FEATURES }}"$'\n\n'
          fi
          
          if [ -n "${{ env.FIXES }}" ]; then
            NOTES+="### Fixes"$'\n'"${{ env.FIXES }}"$'\n\n'
          fi
          
          if [ -n "${{ env.IMPROVEMENTS }}" ]; then
            NOTES+="### Improvements"$'\n'"${{ env.IMPROVEMENTS }}"$'\n\n'
          fi
          
          if [ -n "${{ env.OTHER }}" ]; then
            NOTES+="### Changes"$'\n'"${{ env.OTHER }}"$'\n\n'
          fi
          
          gh release create "v$VERSION" \
            --target "${{ github.sha }}" \
            --title "v$VERSION" \
            --notes "$NOTES"
